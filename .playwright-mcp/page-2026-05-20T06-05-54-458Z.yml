          - generic [ref=e343]:
            - heading "Material Honesty" [level=3] [ref=e344]
            - paragraph [ref=e345]: I let materials speak their own language — concrete remains concrete, timber stays timber. Authenticity in material creates authenticity in space.
        - generic [ref=e346]:
          - generic [ref=e347]: "02"
          - generic [ref=e348]:
            - heading "Light as Architect" [level=3] [ref=e349]
            - paragraph [ref=e350]: Every building is sculpted by the light it receives. I design with light as a primary material, shaping atmosphere as much as form.
        - generic [ref=e351]:
          - generic [ref=e352]: "03"
          - generic [ref=e353]:
            - heading "Contextual Depth" [level=3] [ref=e354]
            - paragraph [ref=e355]: Architecture that ignores its place ignores its purpose. I study the land, the culture, the climate — then respond.
        - generic [ref=e356]:
          - generic [ref=e357]: "04"
          - generic [ref=e358]:
            - heading "Enduring Form" [level=3] [ref=e359]
            - paragraph [ref=e360]: I resist the trendy in favor of the timeless. A well-made building should feel as right in fifty years as it does today.
